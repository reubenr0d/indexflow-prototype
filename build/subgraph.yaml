specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: schema.graphql
dataSources:
  - kind: ethereum/contract
    name: BasketFactory
    network: sepolia
    source:
      address: "0xdcD8458817B87217FB96fF0740861e4A6757ceB4"
      abi: BasketFactory
      startBlock: 10675928
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Basket
        - VaultStateCurrent
      abis:
        - name: BasketFactory
          file: BasketFactory/BasketFactory.json
        - name: BasketVault
          file: BasketFactory/BasketVault.json
        - name: BasketShareToken
          file: BasketFactory/BasketShareToken.json
        - name: ERC20
          file: BasketFactory/ERC20.json
        - name: VaultAccounting
          file: BasketFactory/VaultAccounting.json
      eventHandlers:
        - event: BasketCreated(indexed address,indexed address,address,string)
          handler: handleBasketCreated
      file: BasketFactory/BasketFactory.wasm
  - kind: ethereum/contract
    name: VaultAccounting
    network: sepolia
    source:
      address: "0xD51721b3AfE90b45D1052e84884dEF53ee14729d"
      abi: VaultAccounting
      startBlock: 10675926
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - BasketActivity
        - AssetTokenMapUpdate
        - VaultStateCurrent
        - ProtocolState
      abis:
        - name: VaultAccounting
          file: VaultAccounting/VaultAccounting.json
        - name: BasketVault
          file: VaultAccounting/BasketVault.json
        - name: BasketShareToken
          file: VaultAccounting/BasketShareToken.json
        - name: ERC20
          file: VaultAccounting/ERC20.json
      eventHandlers:
        - event: VaultRegistered(indexed address)
          handler: handleVaultRegistered
        - event: VaultDeregistered(indexed address)
          handler: handleVaultDeregistered
        - event: AssetTokenMapped(indexed bytes32,indexed address)
          handler: handleAssetTokenMapped
        - event: CapitalDeposited(indexed address,uint256)
          handler: handleCapitalDeposited
        - event: CapitalWithdrawn(indexed address,uint256)
          handler: handleCapitalWithdrawn
        - event: PositionOpened(indexed address,indexed bytes32,bool,uint256,uint256)
          handler: handlePositionOpened
        - event: PositionClosed(indexed address,indexed bytes32,bool,int256)
          handler: handlePositionClosed
        - event: PnLRealized(indexed address,int256)
          handler: handlePnlRealized
        - event: MaxOpenInterestSet(address,uint256)
          handler: handleMaxOpenInterestSet
        - event: MaxPositionSizeSet(address,uint256)
          handler: handleMaxPositionSizeSet
        - event: PauseToggled(bool)
          handler: handlePauseToggled
      file: VaultAccounting/VaultAccounting.wasm
  - kind: ethereum/contract
    name: OracleAdapter
    network: sepolia
    source:
      address: "0x67F7881d1a59aCeb4CCB2072f0af7e2762Cec1d6"
      abi: OracleAdapter
      startBlock: 10675926
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - AssetMeta
      abis:
        - name: OracleAdapter
          file: OracleAdapter/OracleAdapter.json
      eventHandlers:
        - event: AssetConfigured(indexed bytes32,string,uint8,address)
          handler: handleAssetConfigured
        - event: AssetRemoved(indexed bytes32)
          handler: handleAssetRemoved
        - event: PriceUpdated(indexed bytes32,uint256,uint256)
          handler: handlePriceUpdated
      file: OracleAdapter/OracleAdapter.wasm
  - kind: ethereum/contract
    name: PoolReserveRegistry
    network: sepolia
    source:
      address: "0xEA3F5EC162F0b583B10E2e14506aC1e0aD4Cf449"
      abi: PoolReserveRegistry
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - PoolSnapshotEvent
        - CoordinationState
        - ChainPoolState
      abis:
        - name: PoolReserveRegistry
          file: PoolReserveRegistry/PoolReserveRegistry.json
      eventHandlers:
        - event: PoolSnapshot((uint64,uint256,uint256,uint256,uint256,uint256,bytes32,bool,uint48))
          handler: handlePoolSnapshot
        - event: RemoteStateUpdated(indexed uint64,uint256,uint256)
          handler: handleRemoteStateUpdated
      file: PoolReserveRegistry/PoolReserveRegistry.wasm
  - kind: ethereum/contract
    name: IntentRouter
    network: sepolia
    source:
      address: "0xa71220762Ff6C0e8D55d492da3265D56C279d2cE"
      abi: IntentRouter
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - IntentAction
        - IntentStats
      abis:
        - name: IntentRouter
          file: IntentRouter/IntentRouter.json
      eventHandlers:
        - event: IntentSubmitted(indexed uint256,indexed address,uint256,uint8)
          handler: handleIntentSubmitted
        - event: IntentExecuted(indexed uint256,indexed address,uint256)
          handler: handleIntentExecuted
        - event: IntentRoutedCrossChain(indexed uint256,indexed uint64,uint256)
          handler: handleIntentRoutedCrossChain
        - event: IntentRefunded(indexed uint256,indexed address,uint256)
          handler: handleIntentRefunded
      file: IntentRouter/IntentRouter.wasm
templates:
  - kind: ethereum/contract
    name: BasketVaultTemplate
    network: sepolia
    source:
      abi: BasketVault
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Basket
        - BasketAsset
        - User
        - UserBasketPosition
        - BasketActivity
      abis:
        - name: BasketVault
          file: BasketVaultTemplate/BasketVault.json
        - name: BasketShareToken
          file: BasketVaultTemplate/BasketShareToken.json
        - name: ERC20
          file: BasketVaultTemplate/ERC20.json
        - name: VaultAccounting
          file: BasketVaultTemplate/VaultAccounting.json
      eventHandlers:
        - event: Deposited(indexed address,uint256,uint256)
          handler: handleDeposited
        - event: Redeemed(indexed address,uint256,uint256)
          handler: handleRedeemed
        - event: AllocatedToPerp(uint256)
          handler: handleAllocatedToPerp
        - event: WithdrawnFromPerp(uint256)
          handler: handleWithdrawnFromPerp
        - event: AssetsUpdated(uint256)
          handler: handleAssetsUpdated
        - event: FeesCollected(indexed address,uint256)
          handler: handleFeesCollected
        - event: ReservePolicyUpdated(uint256)
          handler: handleReservePolicyUpdated
        - event: ReserveToppedUp(indexed address,uint256)
          handler: handleReserveToppedUp
      file: templates/BasketVaultTemplate/BasketVaultTemplate.wasm
