  <text x="214" y="298" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#38bdf8" opacity="0.75">Familiar</text>
  <path d="M 390 210 L 470 210" stroke="#2dd4bf" stroke-width="1.5" stroke-dasharray="5 6" stroke-opacity="0.55" marker-end="url(#tf-m)"/>
  <text x="430" y="198" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#64748b">not the same</text>
  <rect x="516" y="110" width="300" height="200" rx="10" stroke="#38bdf8" stroke-opacity="0.4" stroke-width="1.5" stroke-dasharray="6 5" fill="#38bdf8" fill-opacity="0.05"/>
  <text x="666" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#38bdf8">Redemption liquidity</text>
