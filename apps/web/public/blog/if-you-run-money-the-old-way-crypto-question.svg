  <text x="440" y="42" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2dd4bf" letter-spacing="0.14em" opacity="0.65">THE QUESTION ALLOCATORS IMPLY</text>
  <text x="440" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" fill="#e5e7eb" opacity="0.92">Mark vs. cash-out under stress</text>
