  <text x="214" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#2dd4bf">NAV / marks</text>
  <text x="214" y="178" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" opacity="0.9">Accounting truth</text>
  <text x="214" y="208" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#94a3b8" opacity="0.85">Valuation policy</text>
