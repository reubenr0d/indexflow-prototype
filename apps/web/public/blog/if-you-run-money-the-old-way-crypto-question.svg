<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360" fill="none">
  <defs>
    <linearGradient id="tf-bg" x1="0" y1="0" x2="880" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0a1019"/>
    </linearGradient>
    <filter id="tf-glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="tf-m" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="7" markerHeight="6" orient="auto">
      <path d="M0 0.5 L9 4 L0 7.5Z" fill="#2dd4bf" opacity="0.55"/>
