<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" width="920" height="440" fill="none">
  <defs>
    <linearGradient id="av-bg" x1="0" y1="0" x2="920" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0a1019"/>
    </linearGradient>

    <radialGradient id="av-glow-teal">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="av-glow-sky">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="av-glow-amber">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>

    <filter id="av-glow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="av-glow-sm">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="av-glow-soft">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="av-arr-teal" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0 0.5 L9 4 L0 7.5Z" fill="#2dd4bf" opacity="0.6"/>
    </marker>
    <marker id="av-arr-sky" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0 0.5 L9 4 L0 7.5Z" fill="#38bdf8" opacity="0.5"/>
    </marker>
    <marker id="av-arr-amber" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0 0.5 L9 4 L0 7.5Z" fill="#f59e0b" opacity="0.5"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="920" height="440" rx="12" fill="url(#av-bg)"/>

  <!-- Subtle grid -->
  <g stroke="#2dd4bf" stroke-opacity="0.03" stroke-width="0.5">
    <line x1="0" y1="110" x2="920" y2="110"/>
    <line x1="0" y1="220" x2="920" y2="220"/>
    <line x1="0" y1="330" x2="920" y2="330"/>
    <line x1="184" y1="0" x2="184" y2="440"/>
    <line x1="460" y1="0" x2="460" y2="440"/>
    <line x1="736" y1="0" x2="736" y2="440"/>
  </g>

  <!-- Title -->
  <text x="460" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#2dd4bf" opacity="0.5" letter-spacing="1.8">AUTONOMOUS VAULT MANAGEMENT</text>

  <!-- ===================== LEFT COLUMN: MANAGERS ===================== -->

  <!-- Section label -->
  <text x="155" y="80" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8.5" font-weight="500" fill="#e5e7eb" opacity="0.3" letter-spacing="1.5">MANAGERS</text>

  <!-- AI Agent node (top-left) -->
  <circle cx="155" cy="170" r="56" fill="url(#av-glow-teal)"/>
  <circle cx="155" cy="170" r="46" fill="#0f1419" stroke="#2dd4bf" stroke-width="2" filter="url(#av-glow)"/>
  <circle cx="155" cy="170" r="46" fill="#2dd4bf" opacity="0.04"/>
  <!-- Brain/circuit icon -->
  <g transform="translate(140, 148)" stroke="#2dd4bf" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.8" fill="none">
    <path d="M15 2a6 6 0 0 1 6 6c0 2-1 3.5-2.5 4.5"/>
    <path d="M15 2a6 6 0 0 0-6 6c0 2 1 3.5 2.5 4.5"/>
    <circle cx="15" cy="15" r="3"/>
    <line x1="15" y1="18" x2="15" y2="24"/>
    <line x1="11" y1="21" x2="19" y2="21"/>
    <circle cx="9" cy="9" r="1.5" fill="#2dd4bf" opacity="0.4"/>
    <circle cx="21" cy="9" r="1.5" fill="#2dd4bf" opacity="0.4"/>
  </g>
  <text x="155" y="230" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#2dd4bf" opacity="0.9">AI Agent</text>
  <text x="155" y="246" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#2dd4bf" opacity="0.4">agents/*.md</text>

  <!-- Human Manager node (bottom-left) -->
  <circle cx="155" cy="340" r="48" fill="url(#av-glow-amber)"/>
  <circle cx="155" cy="340" r="40" fill="#0f1419" stroke="#f59e0b" stroke-width="1.8" filter="url(#av-glow-sm)"/>
  <circle cx="155" cy="340" r="40" fill="#f59e0b" opacity="0.03"/>
  <!-- Person icon -->
  <g transform="translate(142, 322)" stroke="#f59e0b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.7" fill="none">
    <circle cx="13" cy="7" r="5"/>
    <path d="M3 24c0-5.5 4.5-10 10-10s10 4.5 10 10"/>
  </g>
  <text x="155" y="394" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="600" fill="#f59e0b" opacity="0.8">Human Manager</text>
  <text x="155" y="410" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#f59e0b" opacity="0.35">Web UI / CLI</text>

  <!-- "OR" divider between AI and Human -->
  <line x1="120" y1="282" x2="190" y2="282" stroke="#e5e7eb" stroke-opacity="0.08" stroke-width="1"/>
  <text x="155" y="286" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" font-weight="600" fill="#e5e7eb" opacity="0.2">or</text>

  <!-- ===================== CENTER: VAULT ===================== -->

  <!-- Vault glow -->
  <circle cx="460" cy="220" r="80" fill="#2dd4bf" opacity="0.015" filter="url(#av-glow-soft)"/>

  <!-- Vault node -->
  <circle cx="460" cy="220" r="66" fill="url(#av-glow-teal)"/>
  <circle cx="460" cy="220" r="56" fill="#0f1419" stroke="#2dd4bf" stroke-width="2.5" filter="url(#av-glow)"/>
  <circle cx="460" cy="220" r="56" fill="#2dd4bf" opacity="0.05"/>

  <!-- Vault/lock icon -->
  <g transform="translate(443, 192)" stroke="#2dd4bf" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.85" fill="none">
    <rect x="3" y="14" width="28" height="18" rx="3"/>
    <path d="M9 14V9a8 8 0 0 1 16 0v5"/>
    <circle cx="17" cy="23" r="2.5"/>
    <line x1="17" y1="25.5" x2="17" y2="28"/>
  </g>
  <text x="460" y="258" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="700" fill="#e5e7eb" opacity="0.95">Basket Vault</text>
  <text x="460" y="275" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8.5" fill="#2dd4bf" opacity="0.4">onlyOwner</text>

  <!-- Vault capabilities (below) -->
  <g font-family="ui-monospace, monospace" font-size="7.5" fill="#e5e7eb" opacity="0.25" text-anchor="middle">
    <text x="400" y="308">open_position</text>
    <text x="520" y="308">close_position</text>
    <text x="400" y="322">allocate_to_perp</text>
    <text x="520" y="322">set_vault_assets</text>
  </g>

  <!-- ===================== CONNECTIONS: MANAGERS -> VAULT ===================== -->

  <!-- AI Agent -> Vault -->
  <path d="M 205 170 C 280 170, 340 200, 398 215" fill="none" stroke="#2dd4bf" stroke-width="1.8" stroke-dasharray="6 4" stroke-opacity="0.45" marker-end="url(#av-arr-teal)"/>
  <!-- Dots on path -->
  <circle cx="260" cy="175" r="2.5" fill="#2dd4bf" opacity="0.5" filter="url(#av-glow-sm)"/>
  <circle cx="320" cy="192" r="2" fill="#2dd4bf" opacity="0.35"/>
  <circle cx="365" cy="207" r="1.5" fill="#2dd4bf" opacity="0.25"/>
  <!-- Label -->
  <text x="300" y="165" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7.5" fill="#2dd4bf" opacity="0.35">MCP tools</text>

  <!-- Human Manager -> Vault -->
  <path d="M 200 340 C 280 340, 340 280, 400 240" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="6 4" stroke-opacity="0.35" marker-end="url(#av-arr-amber)"/>
  <circle cx="260" cy="335" r="2" fill="#f59e0b" opacity="0.4"/>
  <circle cx="330" cy="305" r="1.5" fill="#f59e0b" opacity="0.3"/>
  <!-- Label -->
  <text x="310" y="355" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7.5" fill="#f59e0b" opacity="0.3">same contracts</text>

  <!-- ===================== RIGHT COLUMN: DATA SOURCES ===================== -->

  <!-- Section label -->
  <text x="760" y="80" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8.5" font-weight="500" fill="#e5e7eb" opacity="0.3" letter-spacing="1.5">DATA</text>

  <!-- Yahoo Finance / Price Feed node (top-right) -->
  <circle cx="760" cy="160" r="50" fill="url(#av-glow-sky)"/>
  <circle cx="760" cy="160" r="42" fill="#0f1419" stroke="#38bdf8" stroke-width="1.8" filter="url(#av-glow-sm)"/>
  <circle cx="760" cy="160" r="42" fill="#38bdf8" opacity="0.04"/>
  <!-- Chart/price icon -->
  <g transform="translate(746, 140)" stroke="#38bdf8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" opacity="0.75" fill="none">
    <polyline points="2,22 8,12 14,16 20,6 26,10"/>
    <circle cx="26" cy="10" r="2.5" fill="#38bdf8" opacity="0.3"/>
    <line x1="2" y1="26" x2="26" y2="26"/>
  </g>
  <text x="760" y="216" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#38bdf8" opacity="0.85">Real Prices</text>
  <text x="760" y="232" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#38bdf8" opacity="0.4">Yahoo Finance</text>

  <!-- Oracle / On-Chain node (bottom-right) -->
  <circle cx="760" cy="320" r="44" fill="url(#av-glow-sky)"/>
  <circle cx="760" cy="320" r="36" fill="#0f1419" stroke="#38bdf8" stroke-width="1.5" filter="url(#av-glow-sm)"/>
  <circle cx="760" cy="320" r="36" fill="#38bdf8" opacity="0.03"/>
  <!-- Link/chain icon -->
  <g transform="translate(748, 305)" stroke="#38bdf8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.65" fill="none">
    <path d="M8 18a4 4 0 0 1 0-6l4-4a4 4 0 0 1 6 0"/>
    <path d="M16 6a4 4 0 0 1 0 6l-4 4a4 4 0 0 1-6 0"/>
  </g>
  <text x="760" y="370" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#38bdf8" opacity="0.7">Oracle Keeper</text>
  <text x="760" y="386" text-anchor="middle" font-family="ui-monospace, monospace" font-size="8" fill="#38bdf8" opacity="0.35">on-chain prices</text>

  <!-- ===================== CONNECTIONS: DATA -> VAULT / AGENT ===================== -->

  <!-- Price Feed -> Vault (oracle updates) -->
  <path d="M 724 320 C 650 320, 580 280, 520 240" fill="none" stroke="#38bdf8" stroke-width="1.3" stroke-dasharray="5 4" stroke-opacity="0.3" marker-end="url(#av-arr-sky)"/>
  <circle cx="670" cy="310" r="2" fill="#38bdf8" opacity="0.35"/>
  <circle cx="600" cy="280" r="1.5" fill="#38bdf8" opacity="0.25"/>

  <!-- Yahoo Finance -> AI Agent (market research) -->
  <path d="M 718 155 C 600 140, 400 120, 205 155" fill="none" stroke="#38bdf8" stroke-width="1.2" stroke-dasharray="4 4" stroke-opacity="0.25" marker-end="url(#av-arr-sky)"/>
  <circle cx="550" cy="130" r="2" fill="#38bdf8" opacity="0.3"/>
  <circle cx="400" cy="132" r="1.5" fill="#38bdf8" opacity="0.2"/>
  <!-- Label -->
  <text x="460" y="118" text-anchor="middle" font-family="ui-monospace, monospace" font-size="7.5" fill="#38bdf8" opacity="0.25">yfinance_quote</text>

  <!-- Price feed connection between Yahoo and Oracle -->
  <line x1="760" y1="210" x2="760" y2="278" stroke="#38bdf8" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="776" y="248" font-family="ui-monospace, monospace" font-size="7" fill="#38bdf8" opacity="0.2">keeper sync</text>

  <!-- ===================== BOTTOM: TESTNET BADGE ===================== -->

  <!-- Testnet indicator -->
  <rect x="380" y="400" width="160" height="24" rx="12" fill="#2dd4bf" opacity="0.06" stroke="#2dd4bf" stroke-width="0.8" stroke-opacity="0.15"/>
  <circle cx="400" cy="412" r="3" fill="#2dd4bf" opacity="0.6"/>
  <text x="464" y="416" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-weight="600" fill="#2dd4bf" opacity="0.55">Live on Sepolia Testnet</text>

  <!-- Subtle ambient glow patches -->
  <ellipse cx="155" cy="250" rx="100" ry="120" fill="#2dd4bf" opacity="0.008"/>
  <ellipse cx="760" cy="240" rx="90" ry="110" fill="#38bdf8" opacity="0.008"/>
</svg>
