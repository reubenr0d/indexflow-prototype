<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 400" width="880" height="400" fill="none">
  <defs>
    <linearGradient id="lf-bg" x1="0" y1="0" x2="880" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0a1019"/>
    </linearGradient>
    <linearGradient id="lf-bar-bright" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="lf-bar-mid" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="lf-bar-dim" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="lf-glow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lf-glow-sm">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="lf-arr" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0 0.5 L9 4 L0 7.5Z" fill="#2dd4bf" opacity="0.5"/>
    </marker>
    <style>
      @keyframes lf-dash { to { stroke-dashoffset: -16; } }
      .lf-flow { animation: lf-dash 2s linear infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="880" height="400" rx="12" fill="url(#lf-bg)"/>

  <!-- Subtle grid -->
  <g stroke="#2dd4bf" stroke-opacity="0.03" stroke-width="0.5">
    <line x1="0" y1="100" x2="880" y2="100"/>
    <line x1="0" y1="200" x2="880" y2="200"/>
    <line x1="0" y1="300" x2="880" y2="300"/>
    <line x1="176" y1="0" x2="176" y2="400"/>
    <line x1="352" y1="0" x2="352" y2="400"/>
    <line x1="528" y1="0" x2="528" y2="400"/>
    <line x1="704" y1="0" x2="704" y2="400"/>
  </g>

  <!-- Title -->
  <text x="440" y="36" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#2dd4bf" opacity="0.6" letter-spacing="1.2">$10B DEFI LIQUIDITY ACROSS 100+ CHAINS</text>

  <!-- Baseline -->
  <line x1="60" y1="340" x2="820" y2="340" stroke="#2dd4bf" stroke-opacity="0.12" stroke-width="1"/>

  <!-- Y-axis reference lines -->
  <line x1="60" y1="90" x2="820" y2="90" stroke="#2dd4bf" stroke-opacity="0.04" stroke-width="0.5" stroke-dasharray="4 8"/>
  <text x="52" y="94" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#2dd4bf" opacity="0.25">$4B</text>
  <line x1="60" y1="153" x2="820" y2="153" stroke="#2dd4bf" stroke-opacity="0.04" stroke-width="0.5" stroke-dasharray="4 8"/>
  <text x="52" y="157" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#2dd4bf" opacity="0.25">$3B</text>
  <line x1="60" y1="215" x2="820" y2="215" stroke="#2dd4bf" stroke-opacity="0.04" stroke-width="0.5" stroke-dasharray="4 8"/>
  <text x="52" y="219" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#2dd4bf" opacity="0.25">$2B</text>
  <line x1="60" y1="278" x2="820" y2="278" stroke="#2dd4bf" stroke-opacity="0.04" stroke-width="0.5" stroke-dasharray="4 8"/>
  <text x="52" y="282" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#2dd4bf" opacity="0.25">$1B</text>

  <!-- ========= BARS (power-law distribution) ========= -->

  <!-- Bar 1: Chain A  -  $4B (bright, glowing) -->
  <rect x="80" y="90" width="50" height="250" rx="4" fill="url(#lf-bar-bright)" filter="url(#lf-glow)"/>
  <rect x="80" y="90" width="50" height="250" rx="4" fill="#2dd4bf" opacity="0.04"/>
  <text x="105" y="80" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#2dd4bf" opacity="0.9">$4B</text>
  <text x="105" y="358" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#e5e7eb" opacity="0.8">Chain A</text>

  <!-- Bar 2: Chain B  -  $2.5B -->
  <rect x="150" y="153" width="50" height="187" rx="4" fill="url(#lf-bar-bright)" filter="url(#lf-glow-sm)"/>
  <text x="175" y="143" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#2dd4bf" opacity="0.75">$2.5B</text>
  <text x="175" y="358" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#e5e7eb" opacity="0.7">Chain B</text>

  <!-- Bar 3: Chain C  -  $1.5B -->
  <rect x="220" y="247" width="50" height="93" rx="4" fill="url(#lf-bar-mid)"/>
  <text x="245" y="237" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600" fill="#2dd4bf" opacity="0.55">$1.5B</text>
  <text x="245" y="358" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#e5e7eb" opacity="0.5">Chain C</text>

  <!-- Long tail: 97 chains sharing $2B  -  thin dim bars -->
  <!-- Group of ~30 thin bars progressively fading -->
  <rect x="310" y="310" width="8" height="30" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="322" y="314" width="8" height="26" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="334" y="316" width="8" height="24" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="346" y="318" width="8" height="22" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="358" y="320" width="8" height="20" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="370" y="321" width="8" height="19" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="382" y="322" width="8" height="18" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="394" y="323" width="8" height="17" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="406" y="324" width="8" height="16" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="418" y="325" width="8" height="15" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="430" y="326" width="8" height="14" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="442" y="327" width="7" height="13" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="453" y="328" width="7" height="12" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="464" y="329" width="7" height="11" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="475" y="330" width="7" height="10" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="486" y="331" width="7" height="9" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="497" y="332" width="6" height="8" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="507" y="332" width="6" height="8" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="517" y="333" width="6" height="7" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="527" y="333" width="6" height="7" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="537" y="334" width="6" height="6" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="547" y="334" width="5" height="6" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="556" y="335" width="5" height="5" rx="2" fill="url(#lf-bar-dim)"/>
  <rect x="565" y="335" width="5" height="5" rx="1" fill="url(#lf-bar-dim)"/>
  <rect x="574" y="335" width="5" height="5" rx="1" fill="url(#lf-bar-dim)"/>
  <rect x="583" y="336" width="4" height="4" rx="1" fill="url(#lf-bar-dim)"/>
  <rect x="591" y="336" width="4" height="4" rx="1" fill="url(#lf-bar-dim)"/>
  <rect x="599" y="336" width="4" height="4" rx="1" fill="url(#lf-bar-dim)"/>
  <rect x="607" y="337" width="4" height="3" rx="1" fill="url(#lf-bar-dim)"/>
  <rect x="615" y="337" width="4" height="3" rx="1" fill="url(#lf-bar-dim)"/>
  <rect x="623" y="337" width="3" height="3" rx="1" fill="url(#lf-bar-dim)"/>
  <rect x="630" y="337" width="3" height="3" rx="1" fill="url(#lf-bar-dim)"/>
  <rect x="637" y="338" width="3" height="2" rx="1" fill="url(#lf-bar-dim)"/>
  <rect x="644" y="338" width="3" height="2" rx="1" fill="url(#lf-bar-dim)"/>
  <rect x="651" y="338" width="3" height="2" rx="1" fill="url(#lf-bar-dim)"/>
  <rect x="658" y="338" width="2" height="2" rx="1" fill="url(#lf-bar-dim)"/>
  <rect x="664" y="338" width="2" height="2" rx="1" fill="url(#lf-bar-dim)"/>
  <rect x="670" y="339" width="2" height="1" rx="0.5" fill="url(#lf-bar-dim)"/>
  <rect x="676" y="339" width="2" height="1" rx="0.5" fill="url(#lf-bar-dim)"/>
  <rect x="682" y="339" width="2" height="1" rx="0.5" fill="url(#lf-bar-dim)"/>

  <!-- Dots trailing off (more chains, barely visible) -->
  <circle cx="692" cy="339" r="1" fill="#2dd4bf" opacity="0.06"/>
  <circle cx="698" cy="339" r="1" fill="#2dd4bf" opacity="0.05"/>
  <circle cx="704" cy="339" r="0.8" fill="#2dd4bf" opacity="0.04"/>
  <circle cx="710" cy="339" r="0.8" fill="#2dd4bf" opacity="0.03"/>
  <circle cx="716" cy="339" r="0.6" fill="#2dd4bf" opacity="0.03"/>
  <circle cx="722" cy="339" r="0.5" fill="#2dd4bf" opacity="0.02"/>

  <!-- Long tail label -->
  <text x="500" y="375" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600" fill="#e5e7eb" opacity="0.3">97 other chains: $2B combined</text>

  <!-- ========= FEEDBACK ARROW: users leave thin chains ========= -->

  <!-- Curved arrow from long tail back to Chain A -->
  <path d="M 580 300 C 620 240, 680 160, 720 130 C 740 118, 740 100, 720 92 C 680 76, 400 60, 130 78" fill="none" stroke="#2dd4bf" stroke-width="1.2" stroke-dasharray="5 4" stroke-opacity="0.3" marker-end="url(#lf-arr)" class="lf-flow"/>

  <!-- Label on the arrow -->
  <text x="660" y="68" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9.5" font-weight="600" fill="#2dd4bf" opacity="0.45" letter-spacing="0.5">users migrate to deeper chains</text>

  <!-- Annotation: "thin pools, wide spreads" near the long tail -->
  <text x="500" y="296" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" font-style="italic" fill="#e5e7eb" opacity="0.2">thin pools → wide spreads → poor execution</text>

  <!-- Subtle glow behind big bars to emphasize contrast -->
  <ellipse cx="105" cy="215" rx="40" ry="130" fill="#2dd4bf" opacity="0.02"/>
  <ellipse cx="175" cy="247" rx="38" ry="100" fill="#2dd4bf" opacity="0.015"/>
</svg>
