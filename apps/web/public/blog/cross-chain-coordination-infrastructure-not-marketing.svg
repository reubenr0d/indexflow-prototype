<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 440" width="920" height="440" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="920" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080c14"/>
      <stop offset="100%" stop-color="#0a1019"/>
    </linearGradient>
    <linearGradient id="split" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0"/>
      <stop offset="50%" stop-color="#2dd4bf" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0.4"/>
    </linearGradient>
    <linearGradient id="good" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#38bdf8" stop-opacity="0.45"/>
    </linearGradient>
    <radialGradient id="warm-wash" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="teal-wash" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow-teal" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arr-bad" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0 0.5 L9 4 L0 7.5Z" fill="#ef4444" opacity="0.6"/>
    </marker>
    <marker id="arr-good" viewBox="0 0 10 8" refX="9" refY="4" markerWidth="8" markerHeight="6" orient="auto">
      <path d="M0 0.5 L9 4 L0 7.5Z" fill="#2dd4bf" opacity="0.7"/>
    </marker>
  </defs>

  <rect width="920" height="440" rx="12" fill="url(#bg)"/>

  <g stroke="#2dd4bf" stroke-opacity="0.03" stroke-width="0.6">
    <line x1="0" y1="110" x2="920" y2="110"/>
    <line x1="0" y1="220" x2="920" y2="220"/>
    <line x1="0" y1="330" x2="920" y2="330"/>
    <line x1="230" y1="0" x2="230" y2="440"/>
    <line x1="460" y1="0" x2="460" y2="440"/>
    <line x1="690" y1="0" x2="690" y2="440"/>
  </g>

  <ellipse cx="225" cy="240" rx="220" ry="210" fill="url(#warm-wash)"/>
  <ellipse cx="700" cy="220" rx="225" ry="210" fill="url(#teal-wash)"/>
  <line x1="460" y1="28" x2="460" y2="412" stroke="url(#split)" stroke-width="1.6"/>

  <text x="460" y="34" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" letter-spacing="1.5" fill="#2dd4bf" opacity="0.52">CROSS-CHAIN: MARKETING SURFACE VS OPERATING INFRASTRUCTURE</text>

  <text x="230" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f59e0b" opacity="0.82" letter-spacing="1.2">MARKETING FEATURE</text>
  <text x="230" y="75" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#f59e0b" opacity="0.4" letter-spacing="1.3">deploy everywhere, coordinate nowhere</text>

  <text x="690" y="58" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#2dd4bf" opacity="0.88" letter-spacing="1.2">INFRASTRUCTURE LAYER</text>
  <text x="690" y="75" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9" fill="#2dd4bf" opacity="0.45" letter-spacing="1.3">routing + shared state + redemption discipline</text>

  <!-- LEFT: fragmented islands -->
  <g>
    <rect x="96" y="108" width="104" height="68" rx="10" fill="#0d121a" stroke="url(#bad)" stroke-width="1.6"/>
    <rect x="178" y="134" width="104" height="68" rx="10" fill="#0d121a" stroke="url(#bad)" stroke-width="1.6"/>
    <rect x="260" y="110" width="104" height="68" rx="10" fill="#0d121a" stroke="url(#bad)" stroke-width="1.6"/>

    <text x="148" y="136" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#e5e7eb" opacity="0.85">Chain A</text>
    <text x="230" y="162" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#e5e7eb" opacity="0.85">Chain B</text>
    <text x="312" y="136" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="10" fill="#e5e7eb" opacity="0.85">Chain C</text>

    <line x1="200" y1="142" x2="178" y2="152" stroke="#f59e0b" stroke-opacity="0.25" stroke-dasharray="4 4"/>
    <line x1="282" y1="142" x2="260" y2="152" stroke="#f59e0b" stroke-opacity="0.25" stroke-dasharray="4 4"/>
    <line x1="148" y1="176" x2="230" y2="202" stroke="#ef4444" stroke-opacity="0.22" stroke-dasharray="3 5"/>
    <line x1="312" y1="176" x2="230" y2="202" stroke="#ef4444" stroke-opacity="0.22" stroke-dasharray="3 5"/>

    <rect x="92" y="224" width="276" height="122" rx="12" fill="#0d121a" stroke="#ef4444" stroke-opacity="0.24"/>
    <text x="230" y="250" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#ef4444" opacity="0.86">Headline: "$9M TVL"</text>

    <g>
      <rect x="116" y="266" width="94" height="14" rx="7" fill="#ef4444" fill-opacity="0.16" stroke="#ef4444" stroke-opacity="0.38"/>
      <text x="163" y="276" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#fecaca" font-weight="600">thin reserves</text>

      <rect x="218" y="266" width="94" height="14" rx="7" fill="#f59e0b" fill-opacity="0.16" stroke="#f59e0b" stroke-opacity="0.38"/>
      <text x="265" y="276" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#fde68a" font-weight="600">pricing drift</text>

      <rect x="116" y="286" width="94" height="14" rx="7" fill="#ef4444" fill-opacity="0.16" stroke="#ef4444" stroke-opacity="0.38"/>
      <text x="163" y="296" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#fecaca" font-weight="600">redeem variance</text>

      <rect x="218" y="286" width="94" height="14" rx="7" fill="#ef4444" fill-opacity="0.16" stroke="#ef4444" stroke-opacity="0.38"/>
      <text x="265" y="296" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#fecaca" font-weight="600">kpi blur</text>
    </g>

    <line x1="230" y1="320" x2="230" y2="374" stroke="#ef4444" stroke-width="1.2" stroke-opacity="0.55" stroke-dasharray="4 4" marker-end="url(#arr-bad)"/>
    <text x="230" y="393" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11.5" font-weight="700" fill="#ef4444" opacity="0.84">temporary growth signal</text>
  </g>

  <!-- RIGHT: hub-and-spoke coordinated -->
  <g>
    <circle cx="690" cy="206" r="58" fill="#0f141d" stroke="url(#good)" stroke-width="2.4" filter="url(#glow-teal)"/>
    <text x="690" y="201" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="11" fill="#d1fae5" opacity="0.95">Hub</text>
    <text x="690" y="216" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d1fae5" opacity="0.75">shared execution + accounting</text>

    <circle cx="582" cy="126" r="24" fill="#0f141d" stroke="url(#good)" stroke-width="1.7"/>
    <text x="582" y="131" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#e5e7eb" opacity="0.87">Spoke A</text>

    <circle cx="798" cy="126" r="24" fill="#0f141d" stroke="url(#good)" stroke-width="1.7"/>
    <text x="798" y="131" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#e5e7eb" opacity="0.87">Spoke B</text>

    <circle cx="582" cy="286" r="24" fill="#0f141d" stroke="url(#good)" stroke-width="1.7"/>
    <text x="582" y="291" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#e5e7eb" opacity="0.87">Spoke C</text>

    <circle cx="798" cy="286" r="24" fill="#0f141d" stroke="url(#good)" stroke-width="1.7"/>
    <text x="798" y="291" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="9.5" fill="#e5e7eb" opacity="0.87">Spoke D</text>

    <line x1="603" y1="140" x2="650" y2="172" stroke="#2dd4bf" stroke-opacity="0.7" stroke-width="1.5" marker-end="url(#arr-good)"/>
    <line x1="777" y1="140" x2="730" y2="172" stroke="#2dd4bf" stroke-opacity="0.7" stroke-width="1.5" marker-end="url(#arr-good)"/>
    <line x1="603" y1="272" x2="650" y2="240" stroke="#2dd4bf" stroke-opacity="0.7" stroke-width="1.5" marker-end="url(#arr-good)"/>
    <line x1="777" y1="272" x2="730" y2="240" stroke="#2dd4bf" stroke-opacity="0.7" stroke-width="1.5" marker-end="url(#arr-good)"/>

    <line x1="742" y1="198" x2="784" y2="198" stroke="#38bdf8" stroke-width="1.1" stroke-opacity="0.55" stroke-dasharray="4 4"/>
    <line x1="742" y1="214" x2="784" y2="214" stroke="#38bdf8" stroke-width="1.1" stroke-opacity="0.55" stroke-dasharray="4 4"/>
    <text x="789" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#93c5fd" opacity="0.75">shared state</text>

    <rect x="542" y="334" width="296" height="82" rx="12" fill="#0d121a" stroke="#2dd4bf" stroke-opacity="0.32"/>

    <rect x="560" y="352" width="130" height="14" rx="7" fill="#2dd4bf" fill-opacity="0.14" stroke="#2dd4bf" stroke-opacity="0.3"/>
    <text x="625" y="362" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#99f6e4" font-weight="600">intentional routing</text>

    <rect x="694" y="352" width="130" height="14" rx="7" fill="#38bdf8" fill-opacity="0.14" stroke="#38bdf8" stroke-opacity="0.3"/>
    <text x="759" y="362" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#bae6fd" font-weight="600">pricing consistency</text>

    <rect x="560" y="372" width="130" height="14" rx="7" fill="#2dd4bf" fill-opacity="0.14" stroke="#2dd4bf" stroke-opacity="0.3"/>
    <text x="625" y="382" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#99f6e4" font-weight="600">redeem discipline</text>

    <rect x="694" y="372" width="130" height="14" rx="7" fill="#2dd4bf" fill-opacity="0.14" stroke="#2dd4bf" stroke-opacity="0.3"/>
    <text x="759" y="382" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#99f6e4" font-weight="600">chain attribution</text>

    <line x1="690" y1="306" x2="690" y2="334" stroke="#2dd4bf" stroke-width="1.35" stroke-opacity="0.72" marker-end="url(#arr-good)"/>
  </g>

  <text x="16" y="426" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="8.5" fill="#2dd4bf" opacity="0.34">Same TVL can produce opposite outcomes depending on coordination quality.</text>
</svg>
