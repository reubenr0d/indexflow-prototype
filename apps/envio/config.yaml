# yaml-language-server: $schema=./node_modules/envio/evm.schema.json
name: snx-baskets-hyperindex
description: SNX baskets multichain indexer on Envio HyperIndex

contracts:
  - name: BasketFactory
    abi_file_path: ./abis/BasketFactory.json
    handler: ./src/EventHandlers.ts
    events:
      - event: BasketCreated(address creator, address vault, address shareToken, string name)

  - name: BasketVault
    abi_file_path: ./abis/BasketVault.json
    handler: ./src/EventHandlers.ts
    events:
      - event: Deposited(address user, uint256 usdcAmount, uint256 sharesMinted)
      - event: Redeemed(address user, uint256 sharesBurned, uint256 usdcReturned)
      - event: AllocatedToPerp(uint256 amount)
      - event: WithdrawnFromPerp(uint256 amount)
      - event: AssetsUpdated(uint256 assetCount)
      - event: FeesCollected(address to, uint256 amount)
      - event: ReservePolicyUpdated(uint256 minReserveBps)
      - event: ReserveToppedUp(address from, uint256 amount)

  - name: VaultAccounting
    abi_file_path: ./abis/VaultAccounting.json
    handler: ./src/EventHandlers.ts
    events:
      - event: VaultRegistered(address vault)
      - event: VaultDeregistered(address vault)
      - event: AssetTokenMapped(bytes32 assetId, address token)
      - event: CapitalDeposited(address vault, uint256 amount)
      - event: CapitalWithdrawn(address vault, uint256 amount)
      - event: PositionOpened(address vault, bytes32 asset, bool isLong, uint256 size, uint256 collateral)
      - event: PositionClosed(address vault, bytes32 asset, bool isLong, int256 realisedPnL)
      - event: PnLRealized(address vault, int256 amount)
      - event: MaxOpenInterestSet(address vault, uint256 cap)
      - event: MaxPositionSizeSet(address vault, uint256 cap)
      - event: PauseToggled(bool paused)

  - name: OracleAdapter
    abi_file_path: ./abis/OracleAdapter.json
    handler: ./src/EventHandlers.ts
    events:
      - event: AssetConfigured(bytes32 assetId, string symbol, uint8 feedType, address feedAddress)
      - event: AssetRemoved(bytes32 assetId)
      - event: PriceUpdated(bytes32 assetId, uint256 price, uint256 timestamp)

  - name: StateRelay
    abi_file_path: ./abis/StateRelay.json
    handler: ./src/EventHandlers.ts
    events:
      - event: StateUpdated(uint256 timestamp, uint256 chainCount, uint256 vaultCount)

networks:
  - id: 11155111 # Sepolia
    start_block: 10689376
    rpc_config:
      url: https://ethereum-sepolia-rpc.publicnode.com
    contracts:
      - name: BasketFactory
        address: 0x9c80b76abd7d1470ba9e8aaa49d128b0a99dfec4
        start_block: 10689396
      - name: VaultAccounting
        address: 0xc7aa05ccaea98dc26b8739a19b79875b1432ce43
        start_block: 10689378
      - name: OracleAdapter
        address: 0x69329fec8c0ef120ee56379941d8d367b593d399
        start_block: 10689376
      - name: StateRelay
        address: 0xb837e0d12b16e14c57d829337578ed4111479cd9
        start_block: 10697053
      - name: BasketVault

  - id: 43113 # Avalanche Fuji
    start_block: 54206983
    rpc_config:
      url: https://avalanche-fuji-c-chain-rpc.publicnode.com
    contracts:
      - name: BasketFactory
        address: 0x743194baae87a8a518739a1eb71f04773b46d42e
        start_block: 54329471
      - name: VaultAccounting
        address: 0x32e2a385aa9540d5119ceaa2ecf4fd97a1e002e0
        start_block: 54206983
      - name: OracleAdapter
        address: 0x0e07ea10a1ff1412b9d93f7a38b6498edaacf419
        start_block: 54206983
      - name: StateRelay
        address: 0x0a564071fb11a0b84314f0b78ac69c5742db22a2
        start_block: 54370695
      - name: BasketVault

unordered_multichain_mode: true
preload_handlers: false
address_format: lowercase
