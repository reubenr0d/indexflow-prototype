version: "3.9"

services:
  anvil:
    image: ghcr.io/foundry-rs/foundry:latest
    command: ["anvil", "--host", "0.0.0.0", "--port", "8545", "--chain-id", "31337"]
    ports:
      - "8545:8545"
    healthcheck:
      test: ["CMD-SHELL", "cast block-number --rpc-url http://127.0.0.1:8545 >/dev/null 2>&1"]
      interval: 2s
      timeout: 2s
      retries: 40

  postgres:
    image: postgres:14
    ports:
      - "5432:5432"
    command:
      [
        "postgres",
        "-cshared_preload_libraries=pg_stat_statements",
        "-cmax_connections=200",
      ]
    environment:
      POSTGRES_USER: graph-node
      POSTGRES_PASSWORD: let-me-in
      POSTGRES_DB: graph-node
      PGDATA: "/var/lib/postgresql/data"
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - graph_pg_data:/var/lib/postgresql/data

  ipfs:
    image: ipfs/kubo:v0.17.0
    ports:
      - "5001:5001"
    volumes:
      - graph_ipfs_data:/data/ipfs

  graph-node:
    image: graphprotocol/graph-node
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8020:8020"
      - "8030:8030"
      - "8040:8040"
    depends_on:
      - ipfs
      - postgres
      - anvil
    environment:
      postgres_host: postgres
      postgres_user: graph-node
      postgres_pass: let-me-in
      postgres_db: graph-node
      ipfs: "ipfs:5001"
      ethereum: "anvil:http://anvil:8545"
      GRAPH_LOG: info

  deploy-contracts:
    image: ghcr.io/foundry-rs/foundry:latest
    working_dir: /workspace
    volumes:
      - .:/workspace
    depends_on:
      anvil:
        condition: service_healthy
    environment:
      ANVIL_RPC_URL: http://anvil:8545
      PRIVATE_KEY: ${PRIVATE_KEY:-0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80}
    command: ["sh", "scripts/local/deploy-contracts.sh"]

  deploy-subgraph:
    image: node:23-bullseye
    working_dir: /workspace
    volumes:
      - .:/workspace
    depends_on:
      graph-node:
        condition: service_started
      ipfs:
        condition: service_started
      deploy-contracts:
        condition: service_completed_successfully
    environment:
      GRAPH_NODE_URL: http://graph-node:8020
      IPFS_URL: http://ipfs:5001
      SUBGRAPH_NAME: indexflow-prototype
      NETWORK_NAME: anvil
    command: ["sh", "scripts/local/deploy-subgraph.sh"]

  ui:
    image: node:23-bullseye
    working_dir: /workspace
    volumes:
      - .:/workspace
    depends_on:
      deploy-subgraph:
        condition: service_completed_successfully
    environment:
      NEXT_PUBLIC_SUBGRAPH_URL: http://localhost:8000/subgraphs/name/indexflow-prototype
      NEXT_PUBLIC_WALLETCONNECT_ID: ${NEXT_PUBLIC_WALLETCONNECT_ID:-demo}
    command:
      [
        "sh",
        "-lc",
        "npm --prefix apps/web ci && npm --prefix apps/web run dev -- --hostname 0.0.0.0 --port 3000",
      ]
    ports:
      - "${UI_PORT:-3000}:3000"

volumes:
  graph_pg_data:
  graph_ipfs_data:
