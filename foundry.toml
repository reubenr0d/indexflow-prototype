[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["lib", "node_modules"]
optimizer = true
optimizer_runs = 200
via_ir = true
auto_detect_solc = true

fs_permissions = [
    { access = "read", path = "node_modules" },
    { access = "read-write", path = "./apps/web/src/config" },
]

[profile.ci]
fuzz = { runs = 256 }
verbosity = 3

[rpc_endpoints]
local = "http://127.0.0.1:8545"
arbitrum = "${ARBITRUM_RPC_URL}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"

[etherscan]
arbitrum = { key = "${ARBISCAN_API_KEY}", chain = "arbitrum" }
