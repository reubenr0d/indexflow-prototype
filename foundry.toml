[profile.default]
src = "src"
out = "out"
test = "test"
script = "script"
libs = ["lib", "node_modules"]
optimizer = true
# Lower runs shrink deployed bytecode (Vault is near EIP-170); 200 was marginally over the limit with VaultMath linked.
optimizer_runs = 1
via_ir = true
bytecode_hash = "none"
cbor_metadata = false
auto_detect_solc = true

fs_permissions = [
    { access = "read", path = "node_modules" },
    { access = "read", path = "./out" },
    { access = "read-write", path = "./apps/web/src/config" },
]

[profile.ci]
fuzz = { runs = 256 }
verbosity = 3

[rpc_endpoints]
local = "http://127.0.0.1:8545"
sepolia = "${SEPOLIA_RPC_URL}"
arbitrum = "${ARBITRUM_RPC_URL}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = "sepolia" }
arbitrum = { key = "${ARBISCAN_API_KEY}", chain = "arbitrum" }
