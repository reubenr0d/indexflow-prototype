name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci
  FOUNDRY_VERSION: v1.3.1
  ETHERSCAN_API_KEY: ci-not-required
  ARBISCAN_API_KEY: ci-not-required

# npm ci requires package-lock.json in the repo root; keep it committed.

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Show Forge version
        run: forge --version

      - name: Build contracts
        run: forge build --sizes
        id: build

  test:
    name: Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests
        run: forge test -vvv
        id: tests

  coverage:
    name: Coverage
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Generate LCOV
        run: forge coverage --ir-minimum --report lcov --report-file lcov.info

      - name: Upload coverage to Codecov
        id: codecov_upload
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          disable_search: true
          fail_ci_if_error: false
          use_oidc: true

      - name: Retry Codecov upload once on transient failure
        if: steps.codecov_upload.outcome == 'failure'
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          disable_search: true
          fail_ci_if_error: false
          use_oidc: true

  web_unit:
    name: Web Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Run web Vitest suite
        run: npm --prefix apps/web run test

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Check Solidity formatting
        run: forge fmt --check

      - name: Lint web app
        run: npm run lint:web

  e2e:
    name: E2E (Web + Anvil)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx --prefix apps/web playwright install --with-deps chromium

      - name: Start Anvil
        run: nohup anvil --host 127.0.0.1 --port 8545 > /tmp/anvil.log 2>&1 &

      - name: Deploy local contracts for E2E
        run: npm run deploy:local

      - name: Run E2E tests
        env:
          NEXT_PUBLIC_E2E_TEST_MODE: "1"
          E2E_RPC_URL: "http://127.0.0.1:8545"
          NEXT_PUBLIC_PRIVY_APP_ID: ${{ secrets.NEXT_PUBLIC_PRIVY_APP_ID }}
          PRIVY_TEST_EMAIL: ${{ secrets.PRIVY_TEST_EMAIL }}
          PRIVY_TEST_OTP: ${{ secrets.PRIVY_TEST_OTP }}
        run: npm run test:e2e:ci

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: web-e2e-artifacts
          path: |
            apps/web/playwright-report
            apps/web/test-results
            /tmp/anvil.log

  cross_chain_e2e:
    name: Cross-Chain E2E (Dual Anvil + Envio)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx --prefix apps/web playwright install --with-deps chromium

      - name: Start Hub Anvil (port 8545, chain ID 31337)
        run: nohup anvil --host 127.0.0.1 --port 8545 --chain-id 31337 > /tmp/anvil-hub.log 2>&1 &

      - name: Start Spoke Anvil (port 8546, chain ID 31338)
        run: nohup anvil --host 127.0.0.1 --port 8546 --chain-id 31338 > /tmp/anvil-spoke.log 2>&1 &

      - name: Wait for Anvil nodes
        run: |
          for i in {1..30}; do
            curl -s http://127.0.0.1:8545 -X POST -H "Content-Type: application/json" --data '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' && break
            sleep 1
          done
          for i in {1..30}; do
            curl -s http://127.0.0.1:8546 -X POST -H "Content-Type: application/json" --data '{"jsonrpc":"2.0","method":"eth_chainId","params":[],"id":1}' && break
            sleep 1
          done

      - name: Deploy hub contracts
        run: CHAIN=local npm run deploy:local

      - name: Deploy spoke contracts
        run: CHAIN=local-spoke forge script script/DeploySpoke.s.sol:DeploySpoke --rpc-url http://127.0.0.1:8546 --broadcast || true

      - name: Generate Envio local config
        working-directory: apps/envio
        run: node scripts/gen-local-config.mjs

      - name: Install Envio dependencies
        working-directory: apps/envio
        run: npm ci

      - name: Start Envio dev server
        working-directory: apps/envio
        run: |
          npx envio dev --config config.local.generated.yaml > /tmp/envio.log 2>&1 &
          echo "Waiting for Envio..."
          for i in {1..60}; do
            curl -s http://127.0.0.1:8080/health && break
            sleep 2
          done

      - name: Run cross-chain E2E tests
        env:
          NEXT_PUBLIC_E2E_TEST_MODE: "1"
          NEXT_PUBLIC_ENVIO_URL: "http://127.0.0.1:8080/v1/graphql"
          E2E_HUB_RPC_URL: "http://127.0.0.1:8545"
          E2E_SPOKE_RPC_URL: "http://127.0.0.1:8546"
          E2E_HUB_CHAIN_ID: "31337"
          E2E_SPOKE_CHAIN_ID: "31338"
          E2E_ENVIO_URL: "http://127.0.0.1:8080/v1/graphql"
        run: npx --prefix apps/web playwright test --grep "cross-chain|Envio" || true

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: cross-chain-e2e-artifacts
          path: |
            apps/web/playwright-report
            apps/web/test-results
            /tmp/anvil-hub.log
            /tmp/anvil-spoke.log
            /tmp/envio.log

  keeper_tests:
    name: Keeper Service Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run keeper tests
        run: npm test --prefix services/keeper

  push_worker:
    name: Push Worker Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run push-worker tests
        run: npm run --prefix apps/push-worker test
