name: CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
  workflow_dispatch:

env:
  FOUNDRY_PROFILE: ci
  FOUNDRY_VERSION: v1.3.1

# npm ci requires package-lock.json in the repo root; keep it committed.

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Show Forge version
        run: forge --version

      - name: Build contracts
        run: forge build --sizes
        id: build

  test:
    name: Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Run tests
        run: forge test -vvv
        id: tests

  coverage:
    name: Coverage
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Generate LCOV
        run: forge coverage --ir-minimum --report lcov --report-file lcov.info

      - name: Upload coverage to Codecov
        id: codecov_upload
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          use_oidc: true

      - name: Retry Codecov upload once on transient failure
        if: steps.codecov_upload.outcome == 'failure'
        continue-on-error: true
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
          use_oidc: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Check formatting
        run: forge fmt --check

  e2e:
    name: E2E (Web + Anvil)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            apps/web/package-lock.json

      - name: Install npm dependencies (root)
        run: npm ci

      - name: Install npm dependencies (web)
        run: npm ci --prefix apps/web

      - name: Install Playwright browser
        run: npx --prefix apps/web playwright install --with-deps chromium

      - name: Start Anvil
        run: nohup anvil --host 127.0.0.1 --port 8545 > /tmp/anvil.log 2>&1 &

      - name: Deploy local contracts for E2E
        run: npm run deploy:local

      - name: Run E2E tests
        env:
          NEXT_PUBLIC_E2E_TEST_MODE: "1"
          E2E_RPC_URL: "http://127.0.0.1:8545"
        run: npm run test:e2e:ci

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-e2e-artifacts
          path: |
            apps/web/playwright-report
            apps/web/test-results
            /tmp/anvil.log
