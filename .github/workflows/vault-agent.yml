name: Vault Agent (0G)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run in dry-run mode (observe only, no writes)"
        required: false
        default: false
        type: boolean
      network:
        description: "Target network"
        required: false
        default: "sepolia"
        type: choice
        options:
          - sepolia

env:
  FOUNDRY_VERSION: v1.3.1

permissions:
  contents: write

jobs:
  vault-agent:
    name: Agent "0g-vault-manager" (${{ matrix.network }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - network: sepolia
            deployment_config: apps/web/src/config/sepolia-deployment.json
            rpc_url_secret: SEPOLIA_RPC_URL

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Agent
        env:
          DEPLOYMENT_CONFIG: ${{ matrix.deployment_config }}
          RPC_URL: ${{ secrets[matrix.rpc_url_secret] }}
          PRIVATE_KEY: ${{ secrets.KEEPER_PRIVATE_KEY }}
          KEEPERHUB_API_KEY: ${{ secrets.KEEPERHUB_API_KEY }}
          PROJECT_ROOT: ${{ github.workspace }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL || 'gpt-4o' }}
          # 0G Storage + Compute. Each ZG_* key falls back to the previous via
          # the runner / 0g-storage-mcp logic, so just `KEEPER_PRIVATE_KEY` is
          # enough if you want a single wallet for everything. Set the dedicated
          # secrets if you want to isolate keys.
          ZG_PRIVATE_KEY: ${{ secrets.ZG_PRIVATE_KEY || secrets.KEEPER_PRIVATE_KEY }}
          ZG_COMPUTE_PRIVATE_KEY: ${{ secrets.ZG_COMPUTE_PRIVATE_KEY || secrets.ZG_PRIVATE_KEY || secrets.KEEPER_PRIVATE_KEY }}
          ZG_COMPUTE_PROVIDER: ${{ vars.ZG_COMPUTE_PROVIDER }}
          ZG_COMPUTE_MODEL: ${{ vars.ZG_COMPUTE_MODEL }}
          ZG_RPC_URL: ${{ vars.ZG_RPC_URL }}
          ZG_INDEXER_RPC: ${{ vars.ZG_INDEXER_RPC }}
          ZG_KV_CLIENT_URL: ${{ vars.ZG_KV_CLIENT_URL }}
          ZG_DISABLE_KV: ${{ vars.ZG_DISABLE_KV || '1' }}
          ZG_KV_TIMEOUT_MS: ${{ vars.ZG_KV_TIMEOUT_MS || '5000' }}
          AGENT_DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '' }}
          AGENT_MAX_TURNS: "20"
          AGENT_NETWORK: ${{ matrix.network }}
        run: node scripts/agent-runner.mjs 0g-vault-manager

      - name: Upload agent outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: agent-output-${{ matrix.network }}
          path: |
            agents/memory/
            apps/web/public/agent-metadata/
          retention-days: 1

  commit-results:
    name: Commit all agent outputs
    needs: vault-agent
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all agent outputs
        uses: actions/download-artifact@v4
        with:
          pattern: agent-output-*
          merge-multiple: true

      - name: Commit agent memory and metadata
        run: |
          git config user.name "vault-agent[bot]"
          git config user.email "vault-agent[bot]@users.noreply.github.com"
          git add agents/memory/ apps/web/public/agent-metadata/
          git diff --cached --quiet && exit 0
          git commit -m "chore(agent): update agent memory and metadata"
          git pull --rebase
          git push
