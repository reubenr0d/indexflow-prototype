name: Update Prices

on:
  schedule:
    - cron: "*/15 * * * *"
  pull_request:
  workflow_dispatch:
    inputs:
      network:
        description: "Target network (or 'all' for every configured network)"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - sepolia

env:
  FOUNDRY_VERSION: v1.3.1

jobs:
  update-prices:
    name: Update Prices (${{ matrix.network }})
    runs-on: ubuntu-latest
    concurrency:
      group: update-prices-${{ github.workflow }}-${{ matrix.network }}
      cancel-in-progress: false
    if: >-
      github.event_name == 'schedule'
      || github.event_name == 'pull_request'
      || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        network: [sepolia]
        include:
          - network: sepolia
            deployment_config: apps/web/src/config/sepolia-deployment.json
            rpc_url_secret: SEPOLIA_RPC_URL

    steps:
      - uses: actions/checkout@v5
        if: github.event_name == 'pull_request' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.network == 'all' || github.event.inputs.network == matrix.network))
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        if: github.event_name == 'pull_request' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.network == 'all' || github.event.inputs.network == matrix.network))
        with:
          version: ${{ env.FOUNDRY_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@v5
        if: github.event_name == 'pull_request' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.network == 'all' || github.event.inputs.network == matrix.network))
        with:
          node-version: "22"
          cache: "npm"

      - name: Install npm dependencies
        if: github.event_name == 'pull_request' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.network == 'all' || github.event.inputs.network == matrix.network))
        run: npm ci

      - name: Fetch Yahoo Finance quotes and sync on-chain prices
        if: github.event_name == 'pull_request' || github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && (github.event.inputs.network == 'all' || github.event.inputs.network == matrix.network))
        env:
          DEPLOYMENT_CONFIG: ${{ matrix.deployment_config }}
          RPC_URL: ${{ secrets[matrix.rpc_url_secret] }}
          KEEPERHUB_NETWORK: ${{ matrix.network }}
          PRIVATE_KEY: ${{ github.event_name == 'pull_request' && '' || secrets.KEEPER_PRIVATE_KEY }}
          KEEPERHUB_API_KEY: ${{ github.event_name == 'pull_request' && '' || secrets.KEEPERHUB_API_KEY }}
          DRY_RUN: ${{ github.event_name == 'pull_request' && '1' || '' }}
        run: node scripts/update-yahoo-finance-prices.js
